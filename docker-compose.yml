version: "3.9"
services:
  postgres:
    image: docker.io/library/postgres:17
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      KEYCLOAK_DB_NAME: ${KEYCLOAK_DB_NAME:-keycloak}
      KEYCLOAK_DB_USER: ${KEYCLOAK_DB_USER:-keycloak}
      KEYCLOAK_DB_PASSWORD: ${KEYCLOAK_DB_PASSWORD:-keycloak}
      FORGEJO_DB_NAME: ${FORGEJO_DB_NAME:-forgejo}
      FORGEJO_DB_USER: ${FORGEJO_DB_USER:-forgejo}
      FORGEJO_DB_PASSWD: ${FORGEJO_DB_PASSWD:-forgejo}
    volumes:
      - ./data/postgres:/var/lib/postgresql/data
      - ./assets/postgres-init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL","pg_isready -U ${POSTGRES_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5
  
  forgejo:
    image: codeberg.org/forgejo/forgejo:14
    restart: unless-stopped
    environment:
      RUN_MODE: prod
      FORGEJO____APP_NAME: 5IGIT
      FORGEJO__repository__DEFAULT_PRIVATE: private
      FORGEJO__database__DB_TYPE: ${FORGEJO_DB_TYPE:-postgres}
      FORGEJO__database__HOST: ${FORGEJO_DB_HOST:-postgres}
      FORGEJO__database__NAME: ${FORGEJO_DB_NAME:-forgejo}
      FORGEJO__database__USER: ${FORGEJO_DB_USER:-forgejo}
      FORGEJO__database__PASSWD: ${FORGEJO_DB_PASSWD:-forgejo}
      FORGEJO__database__SCHEMA: public
      FORGEJO__badges__ENABLED: "false" # Information leaks using third-party services, so disable by default
      FORGEJO__badges__GENERATOR_URL_TEMPLATE: "https://127.0.0.1:0/{{.label}}-{{.text}}-{{.color}}"
      FORGEJO__server__PROTOCOL: http
      FORGEJO__server__DOMAIN: git.${HOST}
      FORGEJO__server__ROOT_URL: http://git.${HOST}/
      FORGEJO__server__HTTP_PORT: 3000
      FORGEJO__server__SSH_PORT: 2222
      FORGEJO__server__SSH_LISTEN_PORT: 2222
      FORGEJO__server__OFFLINE_MODE: "true"
      FORGEJO__server__LANDING_PAGE: login
      FORGEJO__security__INSTALL_LOCK: "true"
      FORGEJO__openid__ENABLE_OPENID_SIGNIN: "false"
      FORGEJO__service__DISABLE_REGISTRATION: "true"
      FORGEJO_ADMIN_USERNAME: ${FORGEJO_ADMIN_USERNAME}
      FORGEJO_ADMIN_PASSWORD: ${FORGEJO_ADMIN_PASSWORD}
      FORGEJO_ADMIN_EMAIL: ${FORGEJO_ADMIN_EMAIL}
      FORGEJO_SHARED_SECRET: ${FORGEJO_SHARED_SECRET}
    volumes:
      - ./data/forgejo:/data/
      - ./assets/forgejo_setup.sh:/usr/local/bin/gitea:ro
    depends_on:
      postgres:
        condition: service_healthy

  podman:
    build:
      context: ./podman
      dockerfile: Dockerfile
    restart: unless-stopped
    privileged: true

  forgejo_runner:
    image: code.forgejo.org/forgejo/runner:12
    restart: unless-stopped
    environment:
      RUN_MODE: prod
      DOCKER_HOST: tcp://podman:5656
      FORGEJO_RUNNER__server__ROOT_URL: http://forgejo:3000/
      FORGEJO_RUNNER__server__SSH_PORT: 2222
      FORGEJO_RUNNER__server__OFFLINE_MODE: "true"
      FORGEJO_RUNNER__security__INSTALL_LOCK: "true"
      FORGEJO_SHARED_SECRET: ${FORGEJO_SHARED_SECRET}
    command:
      - /bin/sh
      - -ce
      - |
        while : ; do
          forgejo-runner create-runner-file --connect --instance http://forgejo:3000 --name runner --secret ${FORGEJO_SHARED_SECRET} && break ;
          sleep 1 ;
        done ;
        forgejo-runner daemon --config /data/config.yml
    volumes:
      - ./assets/forgejo-runner-config.yml:/data/config.yml:ro

  keycloak:
    image: quay.io/keycloak/keycloak:latest
    restart: unless-stopped
    environment:
      KC_DB: postgres
      KC_DB_URL: "jdbc:postgresql://postgres:5432/${KEYCLOAK_DB_NAME:-keycloak}"
      KC_DB_USERNAME: ${KEYCLOAK_DB_USER:-keycloak}
      KC_DB_PASSWORD: ${KEYCLOAK_DB_PASSWORD:-keycloak}
      KC_BOOTSTRAP_ADMIN_USERNAME: ${KEYCLOAK_ADMIN}
      KC_BOOTSTRAP_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD}
      KEYCLOAK_ADMIN: ${KEYCLOAK_ADMIN}
      KEYCLOAK_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD}
      KC_HTTP_ENABLED: "true"
      KC_PROXY: "edge"
      KC_PROXY_HEADERS: "xforwarded"
      KC_HOSTNAME_STRICT: "false"
      KC_HOSTNAME: https://auth.${HOST}/
    command:
      - start
    volumes:
      - ./data/keycloak:/opt/keycloak/data
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "8081:8080"

  nginx:
    image: docker.io/library/nginx:latest
    restart: unless-stopped
    ports:
      - "8000:8000"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - forgejo
      - keycloak